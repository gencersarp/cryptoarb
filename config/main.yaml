# ============================================================
# CryptoArb Master Configuration
# ============================================================

project:
  name: cryptoarb
  seed: 42
  results_dir: results/
  log_level: INFO

# ── Assets ───────────────────────────────────────────────────
assets:
  primary:   [BTC, ETH]
  secondary: [SOL, BNB]   # enabled only if data quality passes
  min_history_days: 180

# ── Venues ───────────────────────────────────────────────────
venues:
  - name: binance
    enabled: true
    maker_fee: 0.0002        # 2 bps
    taker_fee: 0.0004        # 4 bps
    funding_interval_hours: 8
    borrow_rate_annual: 0.05
    max_leverage: 10
    min_notional: 10.0

  - name: bybit
    enabled: true
    maker_fee: 0.0001        # 1 bp
    taker_fee: 0.0006        # 6 bps
    funding_interval_hours: 8
    borrow_rate_annual: 0.06
    max_leverage: 10
    min_notional: 10.0

  - name: okx
    enabled: true
    maker_fee: 0.0002        # 2 bps
    taker_fee: 0.0005        # 5 bps
    funding_interval_hours: 8
    borrow_rate_annual: 0.05
    max_leverage: 10
    min_notional: 10.0

# ── Data ─────────────────────────────────────────────────────
data:
  raw_dir: data/raw
  frequency: 8h              # bar frequency matches funding interval
  start_date: "2020-01-01"
  end_date:   "2024-12-31"
  min_bars: 500
  async_ingestion:
    enabled: false
    max_concurrency: 8
    request_timeout_sec: 20
    max_retries: 5

# ── Strategies ───────────────────────────────────────────────
strategies:

  SpotPerpFunding:
    enabled: true
    assets: [BTC, ETH]
    venues: [binance]
    entry_funding_threshold: 0.0000535
    exit_funding_threshold:  0.0000395
    min_annualized_yield:    0.0015
    max_hold_bars:           31
    position_size_pct:       0.77
    max_open_positions:      2
    use_basis_filter:        false
    basis_filter_z:          1.55
    hedge_with_spot:         true
    min_funding_persistence_bars: 1
    min_expected_edge_bps:   0.85
    inventory_risk_bps:      0.71
    expected_hold_bars:      6

  PerpPerpDiff:
    enabled: true
    assets: [BTC, ETH]
    venues: [binance, bybit]
    min_funding_spread:      0.0002   # 8h rate differential
    zscore_lookback:         30
    entry_z:                 2.0
    exit_z:                  0.5
    max_hold_bars:           6        # short duration — funding resets every 8h
    position_size_pct:       0.30
    max_open_positions:      2

  BasisMeanRevert:
    enabled: true
    assets: [BTC, ETH]
    venues: [binance]
    zscore_lookback:         48       # 16 days of 8h bars
    entry_z:                 2.0
    exit_z:                  0.5
    stop_z:                  3.5
    max_hold_bars:           36       # 12 days
    position_size_pct:       0.35
    max_open_positions:      2

  StatArb:
    enabled: true
    assets: [BTC, ETH]
    venues: [binance]
    coint_lookback:          90       # 30 days of 8h bars
    zscore_lookback:         20
    entry_z:                 2.0
    exit_z:                  0.3
    stop_z:                  3.5
    max_hold_bars:           30
    position_size_pct:       0.25
    max_open_positions:      1
    min_coint_pvalue:        0.05

# ── Backtest ─────────────────────────────────────────────────
backtest:
  initial_capital: 100000

  walk_forward:
    n_splits:              5
    train_ratio:           0.60
    val_ratio:             0.20
    test_ratio:            0.20
    randomize_start_offset: true
    offset_range_days:     15
    compute_is_metrics: true
    compute_cost_stress_metrics: true
    cost_stress_fee_mult: 1.5
    cost_stress_slip_mult: 1.5

  execution:
    seed: 42
    maker_fill_prob:        0.55
    slippage_model:         vol_adv  # vol_adv | fixed | zero
    slippage_vol_mult:      0.10     # slippage = vol * mult * sqrt(size/adv)
    min_slippage_bps:       0.5
    max_slippage_bps:       18.0
    exchange_downtime_prob: 0.003
    partial_fill_prob:      0.05
    min_partial_fill_ratio: 0.5
    latency_bps:            0.2

  risk:
    max_drawdown_pct:            10.0
    daily_loss_limit_pct:         3.0
    per_strategy_capital_pct:    80.0
    max_total_leverage:           3.0
    margin_buffer_pct:           20.0
    unrealized_kill_switch_pct:   8.0
    max_leg_divergence_bps:      35.0
    max_exchange_exposure_pct:   80.0

  orphan_protection:
    enabled: true
    max_unhedged_bars: 1

live_screener:
  enabled: true
  top_n: 20
  alert_webhook_url: ""
  min_net_ev_usd: 0.0

dex_funding_velocity:
  hyperliquid:
    enabled: true
    depth_notional: 1200000
    impact_beta: 0.00005
  synthetix:
    enabled: true
    depth_notional: 500000
    impact_beta: 0.00008

# ── Parameter Search ─────────────────────────────────────────
optimization:
  n_trials:              200
  n_startup_trials:       30
  direction:           maximize     # maximize Sharpe
  min_trades:            30
  perturbation_pct:      0.20
  n_perturbations:       20
  seed: 42

# ── Validation ───────────────────────────────────────────────
validation:
  min_oos_sharpe:             0.3
  max_is_oos_sharpe_gap:      1.0
  max_single_fold_return_pct: 0.30
  max_drawdown_limit_pct:     10.0
  min_trades_per_fold:        10
  perturbation_cv_threshold:  0.25
  require_cost_stress_profitability: true
  require_positive_oos_all_folds: false
  min_positive_oos_folds_pct: 0.6

# ── Stress Tests ─────────────────────────────────────────────
stress_tests:
  enabled: true
  funding_flip_shock:
    enabled:          true
    shock_multiplier: -3.0

  vol_spike:
    enabled:       true
    vol_multiplier: 3.0

  cost_stress_15x:
    enabled:      true
    fee_mult:     1.5
    slip_mult:    1.5

  worst_case_composite:
    enabled: true
    funding_mult: -3.0
    vol_mult: 3.0
    fee_mult: 1.5
    slip_mult: 1.5

  crisis_windows:
    enabled: true
    windows:
      - name: covid_crash
        start: "2020-03-01"
        end:   "2020-05-31"
      - name: luna_collapse
        start: "2022-05-01"
        end:   "2022-07-31"
      - name: ftx_collapse
        start: "2022-11-01"
        end:   "2023-01-31"
      - name: btc_bear_2022
        start: "2022-01-01"
        end:   "2022-12-31"
