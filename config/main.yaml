# ============================================================
# CryptoArb Master Configuration
# ============================================================

project:
  name: cryptoarb
  seed: 42
  results_dir: results/
  log_level: INFO

# ── Assets ───────────────────────────────────────────────────
assets:
  primary:   [BTC, ETH]
  secondary: [SOL, BNB]   # enabled only if data quality passes
  min_history_days: 180

# ── Venues ───────────────────────────────────────────────────
venues:
  - name: binance
    enabled: true
    maker_fee: 0.0002        # 2 bps
    taker_fee: 0.0004        # 4 bps
    funding_interval_hours: 8
    borrow_rate_annual: 0.05
    max_leverage: 10
    min_notional: 10.0

  - name: bybit
    enabled: true
    maker_fee: 0.0001        # 1 bp
    taker_fee: 0.0006        # 6 bps
    funding_interval_hours: 8
    borrow_rate_annual: 0.06
    max_leverage: 10
    min_notional: 10.0

  - name: okx
    enabled: true
    maker_fee: 0.0002        # 2 bps
    taker_fee: 0.0005        # 5 bps
    funding_interval_hours: 8
    borrow_rate_annual: 0.05
    max_leverage: 10
    min_notional: 10.0

# ── Data ─────────────────────────────────────────────────────
data:
  raw_dir: data/raw
  frequency: 8h              # bar frequency matches funding interval
  start_date: "2020-01-01"
  end_date:   "2024-12-31"
  min_bars: 500

# ── Strategies ───────────────────────────────────────────────
strategies:

  SpotPerpFunding:
    enabled: true
    assets: [BTC, ETH]
    venues: [binance]
    entry_funding_threshold: 0.0003   # annualized / 3 = 8h rate threshold
    exit_funding_threshold:  0.0001
    min_annualized_yield:    0.05     # 5% annualized minimum
    max_hold_bars:           21       # ~7 days at 8h bars
    position_size_pct:       0.40     # 40% of capital per leg
    max_open_positions:      2
    use_basis_filter:        true
    basis_filter_z:          1.5      # only enter if basis not too stretched

  PerpPerpDiff:
    enabled: true
    assets: [BTC, ETH]
    venues: [binance, bybit]
    min_funding_spread:      0.0002   # 8h rate differential
    zscore_lookback:         30
    entry_z:                 2.0
    exit_z:                  0.5
    max_hold_bars:           6        # short duration — funding resets every 8h
    position_size_pct:       0.30
    max_open_positions:      2

  BasisMeanRevert:
    enabled: true
    assets: [BTC, ETH]
    venues: [binance]
    zscore_lookback:         48       # 16 days of 8h bars
    entry_z:                 2.0
    exit_z:                  0.5
    stop_z:                  3.5
    max_hold_bars:           36       # 12 days
    position_size_pct:       0.35
    max_open_positions:      2

  StatArb:
    enabled: true
    assets: [BTC, ETH]
    venues: [binance]
    coint_lookback:          90       # 30 days of 8h bars
    zscore_lookback:         20
    entry_z:                 2.0
    exit_z:                  0.3
    stop_z:                  3.5
    max_hold_bars:           30
    position_size_pct:       0.25
    max_open_positions:      1
    min_coint_pvalue:        0.05

# ── Backtest ─────────────────────────────────────────────────
backtest:
  initial_capital: 100000

  walk_forward:
    n_splits:              5
    train_ratio:           0.60
    val_ratio:             0.20
    test_ratio:            0.20
    randomize_start_offset: true
    offset_range_days:     15

  execution:
    seed: 42
    maker_fill_prob:        0.60     # 60% chance of maker fill on limit orders
    slippage_model:         vol_adv  # vol_adv | fixed | zero
    slippage_vol_mult:      0.10     # slippage = vol * mult * sqrt(size/adv)
    min_slippage_bps:       0.5
    max_slippage_bps:       50.0
    exchange_downtime_prob: 0.005    # 0.5% chance of missed fill per bar

  risk:
    max_drawdown_pct:            10.0
    daily_loss_limit_pct:         3.0
    per_strategy_capital_pct:    40.0
    max_total_leverage:           3.0
    margin_buffer_pct:           20.0

# ── Parameter Search ─────────────────────────────────────────
optimization:
  n_trials:              200
  n_startup_trials:       30
  direction:           maximize     # maximize Sharpe
  min_trades:            30
  perturbation_pct:      0.20
  n_perturbations:       20
  seed: 42

# ── Validation ───────────────────────────────────────────────
validation:
  min_oos_sharpe:             0.8
  max_is_oos_sharpe_gap:      0.3
  max_single_fold_return_pct: 0.30
  max_drawdown_limit_pct:     10.0
  min_trades_per_fold:        10
  perturbation_cv_threshold:  0.25

# ── Stress Tests ─────────────────────────────────────────────
stress_tests:
  funding_flip_shock:
    enabled:          true
    shock_multiplier: -3.0

  vol_spike:
    enabled:       true
    vol_multiplier: 3.0

  cost_stress_15x:
    enabled:      true
    fee_mult:     1.5
    slip_mult:    1.5

  crisis_windows:
    enabled: true
    windows:
      - name: covid_crash
        start: "2020-03-01"
        end:   "2020-05-31"
      - name: luna_collapse
        start: "2022-05-01"
        end:   "2022-07-31"
      - name: ftx_collapse
        start: "2022-11-01"
        end:   "2023-01-31"
      - name: btc_bear_2022
        start: "2022-01-01"
        end:   "2022-12-31"
