# ============================================================
# CryptoArb Live / Paper Trading Configuration
# ============================================================
# WARNING: Set sandbox: true until validated on paper for >= 30 days

project:
  name: cryptoarb-live
  seed: 42
  log_dir: logs/
  log_level: INFO

paper_trade:
  enabled: true              # MUST be true until you're confident
  initial_capital: 10000
  log_fills: true
  alert_on_signal: true

live:
  enabled: false             # flip to true ONLY after 30+ days paper
  max_order_size_usd: 500
  max_total_exposure_usd: 3000
  emergency_stop_drawdown_pct: 5.0

venues:
  - name: binance
    sandbox: true
    funding_interval_hours: 8
    maker_fee: 0.0002
    taker_fee: 0.0004

strategies:
  SpotPerpFunding:
    enabled: true
    assets: [BTC]
    venues: [binance]
    entry_funding_threshold: 0.0003
    exit_funding_threshold:  0.0001
    max_hold_bars:           21
    position_size_pct:       0.40
    max_open_positions:      1

risk:
  max_drawdown_pct:     5.0
  daily_loss_limit_pct: 2.0
  halt_on_consecutive_losses: 3
